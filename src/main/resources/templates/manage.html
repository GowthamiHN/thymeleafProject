<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Manage Records</title>
</head>
<body>
	<div align="center">
		<h1>Student Records</h1>
		<table border="1">
			<tr>
				<th>Name</th>
				<th>Adress</th>
				<th>Phone</th>
				<th>DOB</th>
				<th>Actions</th>
			</tr>
			
			<tr th:each="student:${list}">
				<td th:text="${student.name}"></td>
				<td th:text="${student.address}"></td>
				<td th:text="${student.phone}"></td>
				<td th:text="${student.dob}"></td>
				<td>
					<a th:href="'edit?id='+${student.id}"><button>Edit</button></a>
					<a th:href="'delete?id=' +${student.id}"><button>Delete</button></a>
				</td>
			</tr>
		</table>
		<br><br>
		<a href="main"> <button>Back</button> </a>
		
		
	</div>
	<script th:if="${msg}">
	alert("[[${msg}]]");
	</script>
</body>
</html>
